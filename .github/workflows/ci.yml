name: Build Status
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  contents: read
jobs:
  security:
    runs-on: ubuntu-latest
    name: Security
    steps:
      - uses: holepunchto/actions/security-base@v1
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: holepunchto/actions/bare-base@v1
      - run: npm test
      - run: npm run test:bare
  test-netns:
    runs-on: ubuntu-latest
    steps:
      - uses: holepunchto/actions/node-base@v1
      - name: Setup network namespaces
        run: sudo test-netns/scripts/setup.sh
      - name: Run netns tests
        run: sudo npm run test:netns
      - name: Teardown network namespaces
        if: always()
        run: sudo test-netns/scripts/teardown.sh
